name: SBOM Generation

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  release:
    types: [published]
  workflow_dispatch:

# Performance: Cancel in-flight runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  security-events: write
  attestations: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  UV_VERSION: "0.9.21"

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Verify Python lock and dependencies
        run: |
          uv lock --check
          uv sync --locked --group dev
          uv run pip-audit --ignore-vuln CVE-2026-1703

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Verify dashboard lockfile
        working-directory: ./dashboard
        run: pnpm install --frozen-lockfile

      - name: Audit dashboard dependencies
        working-directory: ./dashboard
        run: pnpm audit --audit-level=high
      
      - name: Create supply-chain output directories
        run: mkdir -p sbom provenance

      # Python Dependencies SBOM
      - name: Generate Python SBOM (CycloneDX)
        shell: bash
        run: |
          set -euo pipefail
          CYCLONEDX_VENV="${RUNNER_TEMP}/cyclonedx-venv"
          python -m venv "${CYCLONEDX_VENV}"
          "${CYCLONEDX_VENV}/bin/pip" install --upgrade pip
          "${CYCLONEDX_VENV}/bin/pip" install "cyclonedx-bom==7.2.2"
          "${CYCLONEDX_VENV}/bin/cyclonedx-py" environment ./.venv/bin/python \
            --pyproject ./pyproject.toml \
            --output-reproducible \
            --of JSON \
            -o ./sbom/valdrics-python-sbom.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      
      # Container Image SBOM
      - name: Build Docker Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: valdrics/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Generate Container SBOM (Syft)
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          image: valdrics/api:${{ github.sha }}
          format: cyclonedx-json
          output-file: ./sbom/valdrics-container-sbom.json
      
      # Vulnerability Scan
      - name: Scan SBOM for Vulnerabilities (Grype)
        uses: anchore/scan-action@869c549e657a088dc0441b08ce4fc0ecdac2bb65 # v5
        with:
          sbom: ./sbom/valdrics-container-sbom.json
          fail-build: true
          severity-cutoff: high

      - name: Generate supply-chain provenance manifest
        run: |
          uv run python scripts/generate_provenance_manifest.py \
            --output ./provenance/supply-chain-manifest.json \
            --sbom-dir sbom
      
      # Upload as Artifacts
      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supply-chain-evidence
          path: |
            ./sbom/
            ./provenance/
          retention-days: 90

      - name: Attest SBOM artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "./sbom/*.json"

      - name: Attest provenance manifest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "./provenance/supply-chain-manifest.json"

      - name: Verify provenance attestations (release gate)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run python scripts/verify_supply_chain_attestations.py \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow .github/workflows/sbom.yml \
            --artifact ./sbom/valdrics-python-sbom.json \
            --artifact ./sbom/valdrics-container-sbom.json \
            --artifact ./provenance/supply-chain-manifest.json
      
      # Intentionally do not push directly to main from CI.
      # SBOM artifacts are published through workflow artifacts/releases.
      
      # Upload to GitHub Security
      - name: Upload to GitHub Dependency Graph
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        if: github.event_name == 'pull_request'

  compliance-report:
    name: Generate Compliance Report
    needs: generate-sbom
    runs-on: ubuntu-24.04
    
    steps:
      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: supply-chain-evidence
          path: ./evidence
      
      - name: Generate License Report
        run: |
          echo "# License Compliance Report" > compliance-report.md
          echo "Generated: $(date -u)" >> compliance-report.md
          echo "" >> compliance-report.md
          echo "## Python Dependencies" >> compliance-report.md
          jq -r '.components[] | "- \(.name)@\(.version): \(.licenses[0].license.id // "Unknown")"' \
            ./evidence/sbom/valdrics-python-sbom.json >> compliance-report.md 2>/dev/null || echo "- No components found" >> compliance-report.md
      
      - name: Upload Compliance Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compliance-report
          path: compliance-report.md
