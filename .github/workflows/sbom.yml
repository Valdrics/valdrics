name: SBOM Generation

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  release:
    types: [published]
  workflow_dispatch:

# Performance: Cancel in-flight runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  security-events: write
  attestations: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24.14.0"
  PNPM_VERSION: "10.32.1"
  UV_VERSION: "0.10.9"

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Verify Python lock and dependencies
        run: |
          uv lock --check
          uv sync --locked --group dev
          uv run pip-audit --ignore-vuln CVE-2026-1703

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Verify dashboard lockfile
        working-directory: ./dashboard
        run: pnpm install --frozen-lockfile

      - name: Audit dashboard dependencies
        working-directory: ./dashboard
        run: pnpm audit --audit-level=high
      
      - name: Create supply-chain output directories
        run: mkdir -p sbom provenance

      # Python Dependencies SBOM
      - name: Generate Python SBOM (CycloneDX)
        shell: bash
        run: |
          set -euo pipefail
          CYCLONEDX_VENV="${RUNNER_TEMP}/cyclonedx-venv"
          python -m venv "${CYCLONEDX_VENV}"
          "${CYCLONEDX_VENV}/bin/pip" install --upgrade pip
          "${CYCLONEDX_VENV}/bin/pip" install "cyclonedx-bom==7.2.2"
          "${CYCLONEDX_VENV}/bin/cyclonedx-py" environment ./.venv/bin/python \
            --pyproject ./pyproject.toml \
            --output-reproducible \
            --of JSON \
            -o ./sbom/valdrics-python-sbom.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      
      # Container Image SBOM
      - name: Build Docker Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          load: true
          tags: valdrics/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Generate Container SBOM (Syft)
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: valdrics/api:${{ github.sha }}
          format: cyclonedx-json
          output-file: ./sbom/valdrics-container-sbom.json
      
      # Vulnerability Scan
      # Blocking container vulnerability enforcement lives in `security-scan.yml`
      # and `ci.yml` via Trivy. Keep Grype here for supply-chain evidence without
      # introducing a second conflicting release gate with a different database.
      - name: Scan SBOM for Vulnerabilities (Grype report)
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          sbom: ./sbom/valdrics-container-sbom.json
          fail-build: false
          severity-cutoff: high

      - name: Generate supply-chain provenance manifest
        run: |
          uv run python scripts/generate_provenance_manifest.py \
            --output ./provenance/supply-chain-manifest.json \
            --sbom-dir sbom
      
      # Upload as Artifacts
      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: supply-chain-evidence
          path: |
            ./sbom/
            ./provenance/
          retention-days: 90

      - name: Attest SBOM artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./sbom/*.json"

      - name: Attest provenance manifest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./provenance/supply-chain-manifest.json"

      - name: Verify provenance attestations (release gate)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run python scripts/verify_supply_chain_attestations.py \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow .github/workflows/sbom.yml \
            --artifact ./sbom/valdrics-python-sbom.json \
            --artifact ./sbom/valdrics-container-sbom.json \
            --artifact ./provenance/supply-chain-manifest.json
      
      # Intentionally do not push directly to main from CI.
      # SBOM artifacts are published through workflow artifacts/releases.
      
      # Upload to GitHub Security
      - name: Upload to GitHub Dependency Graph
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        if: github.event_name == 'pull_request'

  compliance-report:
    name: Generate Compliance Report
    needs: generate-sbom
    runs-on: ubuntu-24.04
    
    steps:
      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: supply-chain-evidence
          path: ./evidence
      
      - name: Generate License Report
        run: |
          echo "# License Compliance Report" > compliance-report.md
          echo "Generated: $(date -u)" >> compliance-report.md
          echo "" >> compliance-report.md
          echo "## Python Dependencies" >> compliance-report.md
          jq -r '.components[] | "- \(.name)@\(.version): \(.licenses[0].license.id // "Unknown")"' \
            ./evidence/sbom/valdrics-python-sbom.json >> compliance-report.md 2>/dev/null || echo "- No components found" >> compliance-report.md
      
      - name: Upload Compliance Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: compliance-report
          path: compliance-report.md
