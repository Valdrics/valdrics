name: Disaster Recovery Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.10.9"
  ENVIRONMENT: "staging"
  TESTING: "false"
  DEBUG: "false"
  DATABASE_URL: "postgresql+asyncpg://postgres:local-dev-change-me@127.0.0.1:5432/valdrics"
  DB_SSL_MODE: "disable"
  API_URL: "https://api.staging.valdrics.example"
  FRONTEND_URL: "https://dashboard.staging.valdrics.example"
  PLATFORM_RUNTIME_PROFILE: "gcp"
  OBSERVABILITY_BACKEND: "gcp"
  CSRF_SECRET_KEY: "ci-csrf-secret-key-32-chars-min-000000"
  ENCRYPTION_KEY: "ci-encryption-key-32-chars-min-00000000"
  KDF_SALT: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
  SUPABASE_JWT_SECRET: "ci-supabase-jwt-secret-32-chars-0000"
  ENFORCEMENT_APPROVAL_TOKEN_SECRET: "ci-enforcement-approval-secret-0000000000"
  ENFORCEMENT_EXPORT_SIGNING_SECRET: "ci-enforcement-export-signing-secret-0000"
  ADMIN_API_KEY: "ci-admin-api-key-32-chars-min-0000000"
  GROQ_API_KEY: "testing"
  PAYSTACK_SECRET_KEY: "example_paystack_secret_ci_validation_only"
  PAYSTACK_PUBLIC_KEY: "example_paystack_public_ci_validation_only"
  PUBLIC_API_RATE_LIMITING_BACKEND: "cloudflare"
  RATELIMIT_ENABLED: "false"
  APP_RUNTIME_DATA_DIR: "/tmp/valdrics"
  TRUST_PROXY_HEADERS: "true"
  TRUSTED_PROXY_CIDRS: '["127.0.0.1/32"]'
  GCP_PROJECT_ID: "valdrics-staging"
  GCP_REGION: "us-central1"
  GCP_CLOUD_TASKS_QUEUE: "valdrics-default"
  GCP_CLOUD_TASKS_INVOKER_SERVICE_ACCOUNT_EMAIL: "tasks@valdrics-staging.iam.gserviceaccount.com"
  GCP_CLOUD_RUN_SERVICE_NAME: "valdrics-api"
  GCP_CLOUD_RUN_BATCH_JOB_NAME: "valdrics-scheduler-batch"
  GCP_INTERNAL_ALLOWED_SERVICE_ACCOUNTS: '["tasks@valdrics-staging.iam.gserviceaccount.com","scheduler@valdrics-staging.iam.gserviceaccount.com"]'

jobs:
  drill:
    name: Run Rebuild-and-Verify DR Drill
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16.13-alpine
        env:
          POSTGRES_DB: valdrics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: local-dev-change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d valdrics"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install Dependencies
        run: uv sync --locked --dev

      - name: Export Strict-Environment Forecast Break-Glass Metadata
        run: |
          set -euo pipefail
          echo "FORECASTER_ALLOW_HOLT_WINTERS_FALLBACK=true" >> "$GITHUB_ENV"
          echo "FORECASTER_BREAK_GLASS_REASON=CI disaster recovery validation without Prophet wheel" >> "$GITHUB_ENV"
          python3 - <<'PY'
          from datetime import datetime, timedelta, timezone
          import os
          expires_at = (datetime.now(timezone.utc) + timedelta(hours=6)).isoformat().replace("+00:00", "Z")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"FORECASTER_BREAK_GLASS_EXPIRES_AT={expires_at}\n")
          PY

      - name: Runtime Env Preflight
        run: uv run python scripts/validate_runtime_env.py --environment staging

      - name: Apply Database Migrations
        run: uv run alembic upgrade head

      - name: Launch Local API
        run: |
          set -euo pipefail
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/valdrics-dr-drill.log 2>&1 &
          echo $! > /tmp/valdrics-dr-drill.pid

      - name: Launch Managed Worker Loop
        run: |
          set -euo pipefail
          uv run python -u scripts/run_local_managed_worker.py --interval-seconds 1 > /tmp/valdrics-dr-drill-worker.log 2>&1 &
          echo $! > /tmp/valdrics-dr-drill-worker.pid

      - name: Wait for Local API
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/health/live"
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("disaster recovery drill API failed to become ready within 60 seconds")
          PY

      - name: Run Disaster Recovery Drill
        run: |
          uv run python scripts/run_disaster_recovery_drill.py \
            --url http://127.0.0.1:8000 \
            --max-duration-seconds 1200 \
            --out reports/dr/drill_${{ github.run_id }}.json

      - name: Upload DR Drill Evidence
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dr-drill-evidence
          path: reports/dr/drill_${{ github.run_id }}.json
          retention-days: 30

      - name: Upload DR Drill API Log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dr-drill-api-log
          path: /tmp/valdrics-dr-drill.log
          retention-days: 30

      - name: Upload DR Drill Worker Log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dr-drill-worker-log
          path: /tmp/valdrics-dr-drill-worker.log
          retention-days: 30

      - name: Stop Local API
        if: always()
        run: |
          if [ -f /tmp/valdrics-dr-drill.pid ]; then
            kill "$(cat /tmp/valdrics-dr-drill.pid)" || true
          fi

      - name: Stop Managed Worker Loop
        if: always()
        run: |
          if [ -f /tmp/valdrics-dr-drill-worker.pid ]; then
            kill "$(cat /tmp/valdrics-dr-drill-worker.pid)" || true
          fi
