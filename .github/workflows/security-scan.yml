name: Security Scan

on:
  push:
    branches: [ main, develop ]
    paths:
      - "app/**"
      - "dashboard/**"
      - "terraform/**"
      - "Dockerfile"
      - "Dockerfile.dashboard"
      - ".dockerignore"
      - "scripts/docker-entrypoint.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security-scan.yml"
      - ".github/workflows/ci.yml"
      - ".github/actions/**"
  pull_request:
    branches: [ main ]
    paths:
      - "app/**"
      - "dashboard/**"
      - "terraform/**"
      - "Dockerfile"
      - "Dockerfile.dashboard"
      - ".dockerignore"
      - "scripts/docker-entrypoint.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security-scan.yml"
      - ".github/workflows/ci.yml"
      - ".github/actions/**"
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

# Performance: Cancel in-flight runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  TERRAFORM_VERSION: "1.14.8"
  UV_VERSION: "0.10.9"
  TRIVY_IMAGE: "docker.io/aquasec/trivy:0.69.3"

jobs:
  classify-changes:
    name: Classify Security Scan Surfaces
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      backend_container: ${{ steps.classify.outputs.backend_container }}
      dashboard_container: ${{ steps.classify.outputs.dashboard_container }}
      terraform: ${{ steps.classify.outputs.terraform }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          backend_container=false
          dashboard_container=false
          terraform=false

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            base_sha=""
            head_sha=""
          fi

          if [[ -z "${base_sha}" || -z "${head_sha}" ]]; then
            backend_container=true
            dashboard_container=true
            terraform=true
          else
            mapfile -t changed_files < <(git diff --name-only "${base_sha}" "${head_sha}")

            if [[ ${#changed_files[@]} -eq 0 ]]; then
              backend_container=true
              dashboard_container=true
              terraform=true
            else
              for path in "${changed_files[@]}"; do
                case "${path}" in
                  .github/workflows/security-scan.yml|.github/workflows/ci.yml|.github/actions/*/action.yml|.dockerignore)
                    backend_container=true
                    dashboard_container=true
                    terraform=true
                    ;;
                  Dockerfile|pyproject.toml|uv.lock|app/*|scripts/docker-entrypoint.sh)
                    backend_container=true
                    ;;
                  Dockerfile.dashboard|dashboard/*)
                    dashboard_container=true
                    ;;
                  terraform/*)
                    terraform=true
                    ;;
                esac
              done
            fi
          fi

          {
            echo "backend_container=${backend_container}"
            echo "dashboard_container=${dashboard_container}"
            echo "terraform=${terraform}"
          } >> "${GITHUB_OUTPUT}"

  security-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Security Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --group dev
        
      - name: Run Bandit SAST
        run: uv run bandit -r app/ -ll
        
      - name: Run pip-audit
        run: uv run pip-audit --ignore-vuln CVE-2026-3219
        
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@6c05c4a00b91aa542267d8e32a8254774799d68d # v3.93.8

      - name: Gitleaks Secret Scan (OSS, Commit Range Gate)
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            LOG_OPTS="${{ github.event.before }}..${{ github.sha }}"
          else
            LOG_OPTS="HEAD~1..HEAD"
          fi

          echo "Running OSS gitleaks commit-range scan: ${LOG_OPTS}"
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.2 \
            git --redact --exit-code 1 --no-banner --log-opts="${LOG_OPTS}" /repo

  terraform-quality:
    name: Terraform Validate / Lint / Security
    runs-on: ubuntu-24.04
    needs: [classify-changes]
    if: needs.classify-changes.outputs.terraform == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform validate -no-color

      - name: Terraform Security Scan (tfsec)
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            aquasec/tfsec:v1.28.14 \
            /src/terraform \
            --minimum-severity HIGH

      - name: Terraform Lint (tflint)
        uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33 # v6.2.1
        with:
          tflint_version: v0.61.0

      - name: Run TFLint
        run: |
          cd terraform
          tflint --init
          tflint --minimum-failure-severity=error -f compact

  container-scan:
    runs-on: ubuntu-24.04
    needs: [classify-changes]
    if: needs.classify-changes.outputs.backend_container == 'true' || needs.classify-changes.outputs.dashboard_container == 'true'
    timeout-minutes: 40
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Backend Docker Image
        if: needs.classify-changes.outputs.backend_container == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          load: true
          tags: valdrics-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,scope=backend-image,mode=max

      - name: Build Dashboard Docker Image
        if: needs.classify-changes.outputs.dashboard_container == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          load: true
          tags: valdrics-dashboard:${{ github.sha }}
          cache-from: type=gha,scope=dashboard-image
          cache-to: type=gha,scope=dashboard-image,mode=max

      - name: Prepare Trivy cache
        run: mkdir -p .cache/trivy

      - name: Run Trivy vulnerability scanner (Backend)
        if: needs.classify-changes.outputs.backend_container == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -v "$PWD/.cache/trivy:/root/.cache/trivy" \
            -w /work \
            -e TRIVY_CACHE_DIR=/root/.cache/trivy \
            "${TRIVY_IMAGE}" image \
            --scanners vuln \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            --format sarif \
            --skip-version-check \
            --output /work/trivy-backend-results.sarif \
            --exit-code 1 \
            valdrics-backend:${{ github.sha }}

      - name: Run Trivy vulnerability scanner (Dashboard)
        if: needs.classify-changes.outputs.dashboard_container == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -v "$PWD/.cache/trivy:/root/.cache/trivy" \
            -w /work \
            -e TRIVY_CACHE_DIR=/root/.cache/trivy \
            "${TRIVY_IMAGE}" image \
            --scanners vuln \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            --format sarif \
            --skip-version-check \
            --output /work/trivy-dashboard-results.sarif \
            --exit-code 1 \
            valdrics-dashboard:${{ github.sha }}

      - name: Upload Backend Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@0c0c5dc2f136b98cb0537075ccfa21f94cd9a63e # codeql-bundle-v2.24.3
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Upload Dashboard Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@0c0c5dc2f136b98cb0537075ccfa21f94cd9a63e # codeql-bundle-v2.24.3
        if: always() && hashFiles('trivy-dashboard-results.sarif') != ''
        with:
          sarif_file: 'trivy-dashboard-results.sarif'
          category: 'trivy-dashboard'

  dast-zap-baseline:
    name: DAST (OWASP ZAP Baseline)
    runs-on: ubuntu-24.04
    needs: [security-scan, container-scan]
    # Keep PR security feedback fast; run browser DAST on mainline and schedules.
    if: github.event_name != 'pull_request'
    timeout-minutes: 35
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare ephemeral QA environment
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_local_compose_env.py --output-path .env.compose.dev --seed security-scan-dast-compose-v1
          python3 - <<'PY'
          from pathlib import Path

          path = Path(".env.compose.dev")
          lines = path.read_text(encoding="utf-8").splitlines()
          overrides = {
              "DEBUG": "false",
              "APP_RUNTIME_DATA_DIR": "/tmp/valdrics",
              "PUBLIC_API_RATE_LIMITING_BACKEND": "cloudflare",
              "RATELIMIT_ENABLED": "false",
              "PAYSTACK_WEBHOOK_ALLOWED_IPS": "[\"52.31.139.75\",\"52.49.173.169\",\"52.214.14.220\"]",
          }

          rendered = []
          seen = set()
          for line in lines:
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0].strip()
                  if key in overrides:
                      rendered.append(f"{key}={overrides[key]}")
                      seen.add(key)
                      continue
              rendered.append(line)
          for key, value in overrides.items():
              if key not in seen:
                  rendered.append(f"{key}={value}")
          path.write_text("\n".join(rendered) + "\n", encoding="utf-8")
          PY

      - name: Start ephemeral QA stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file .env.compose.dev up -d --build postgres api dashboard

      - name: Wait for QA readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            api_ready=0
            ui_ready=0
            if curl -fsS http://localhost:8000/health/live >/dev/null 2>&1; then
              api_ready=1
            fi
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              ui_ready=1
            fi
            if [ "$api_ready" -eq 1 ] && [ "$ui_ready" -eq 1 ]; then
              exit 0
            fi
            sleep 5
          done
          docker compose --env-file .env.compose.dev ps
          echo "Ephemeral QA stack did not become healthy in time."
          exit 1

      - name: Run OWASP ZAP Baseline against ephemeral QA
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-a -j -m 5 -T 60"
          allow_issue_writing: false

      - name: Tear down ephemeral QA stack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .env.compose.dev ]; then
            docker compose --env-file .env.compose.dev down -v
          fi
