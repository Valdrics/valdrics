name: Regional Failover

on:
  workflow_dispatch:
    inputs:
      secondary_region:
        description: "Secondary AWS region hosting the warm-standby stack"
        required: true
        default: "us-west-2"
      secondary_db_instance_id:
        description: "Secondary-region RDS read replica identifier"
        required: true
      aws_role_to_assume:
        description: "AWS role ARN assumed through GitHub OIDC for regional failover"
        required: true
      secondary_api_origin:
        description: "Direct origin URL for the secondary API stack"
        required: true
      api_record_name:
        description: "Cloudflare DNS record name to cut over"
        required: true
        default: "api.valdrics.example"
      cloudflare_zone_id:
        description: "Cloudflare zone id for the production API zone"
        required: true
      cloudflare_dns_record_id:
        description: "Cloudflare DNS record id for the API CNAME"
        required: true
      dry_run:
        description: "Skip mutation and emit failover evidence only"
        required: true
        default: "true"

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.10.9"

jobs:
  failover:
    name: Execute Regional Failover
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install Dependencies
        run: uv sync --locked --dev

      - name: Configure AWS Credentials via GitHub OIDC
        run: >-
          uv run python scripts/configure_github_oidc_aws_credentials.py
          --role-arn "${{ inputs.aws_role_to_assume }}"
          --region "${{ inputs.secondary_region }}"
          --session-name "regional-failover-${{ github.run_id }}"

      - name: Execute Regional Failover Script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FAILOVER_AWS_ROLE_TO_ASSUME: ${{ inputs.aws_role_to_assume }}
        run: >-
          uv run python scripts/run_regional_failover.py
          --secondary-region "${{ inputs.secondary_region }}"
          --secondary-db-instance-id "${{ inputs.secondary_db_instance_id }}"
          --secondary-api-origin "${{ inputs.secondary_api_origin }}"
          --api-record-name "${{ inputs.api_record_name }}"
          --cloudflare-zone-id "${{ inputs.cloudflare_zone_id }}"
          --cloudflare-dns-record-id "${{ inputs.cloudflare_dns_record_id }}"
          --out regional-failover-evidence.json
          ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Upload Failover Evidence
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: regional-failover-evidence
          path: regional-failover-evidence.json
