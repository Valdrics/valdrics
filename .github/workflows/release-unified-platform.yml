name: Release Unified Platform

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Immutable release tag to build and promote."
        required: true
        type: string
      git_ref:
        description: "Git ref to release. Defaults to the triggering SHA."
        required: false
        type: string
      promote_production:
        description: "Promote the exact staging artifact to production after staging succeeds."
        required: true
        default: false
        type: boolean

concurrency:
  group: release-unified-platform-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24.14.0"
  PNPM_VERSION: "10.32.1"
  UV_VERSION: "0.10.9"

jobs:
  validate:
    name: Validate Release Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Validate release contracts
        shell: bash
        run: |
          set -euo pipefail
          uv run ruff check scripts/generate_managed_deployment_artifacts.py scripts/managed_deployment_contract.py scripts/preflight_runtime_env_contract.py
          uv run pytest -q --tb=short --no-cov \
            tests/unit/ops/test_unified_platform_release_contract.py \
            tests/unit/ops/test_production_deployment_contracts.py \
            tests/unit/ops/test_managed_deployment_contract.py \
            tests/unit/ops/test_generate_managed_deployment_artifacts.py \
            tests/unit/ops/test_preflight_runtime_env_contract.py

  bootstrap-terraform-state:
    name: Bootstrap Terraform State
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform apply state backend foundation
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/state-backend init
          if ! terraform -chdir=terraform/state-backend state show google_project_service.storage >/dev/null 2>&1; then
            if gcloud services list \
              --enabled \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --filter="name:storage.googleapis.com" \
              --format="value(name)" | grep -q "storage.googleapis.com"; then
              terraform -chdir=terraform/state-backend import \
                -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
                -var="gcp_region=${{ vars.GCP_REGION }}" \
                -var="state_bucket_name=${{ vars.TERRAFORM_STATE_BUCKET }}" \
                -var='terraform_state_principals=["serviceAccount:${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}"]' \
                google_project_service.storage \
                "${{ vars.GCP_PROJECT_ID }}/storage.googleapis.com"
            fi
          fi
          if ! terraform -chdir=terraform/state-backend state show google_storage_bucket.terraform_state >/dev/null 2>&1; then
            if gcloud storage buckets describe "gs://${{ vars.TERRAFORM_STATE_BUCKET }}" >/dev/null 2>&1; then
              terraform -chdir=terraform/state-backend import \
                -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
                -var="gcp_region=${{ vars.GCP_REGION }}" \
                -var="state_bucket_name=${{ vars.TERRAFORM_STATE_BUCKET }}" \
                -var='terraform_state_principals=["serviceAccount:${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}"]' \
                google_storage_bucket.terraform_state \
                "${{ vars.TERRAFORM_STATE_BUCKET }}"
            fi
          fi
          terraform -chdir=terraform/state-backend plan \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcp_region=${{ vars.GCP_REGION }}" \
            -var="state_bucket_name=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -var='terraform_state_principals=["serviceAccount:${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}"]' \
            -out=tfplan
          terraform -chdir=terraform/state-backend apply -auto-approve tfplan

  bootstrap-artifact-registry:
    name: Bootstrap Artifact Registry
    needs:
      - validate
      - bootstrap-terraform-state
      - preflight-staging-managed-platform
      - preflight-production-managed-platform
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform apply Artifact Registry foundation
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/artifact-registry init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="prefix=artifact-registry/${{ vars.GCP_PROJECT_ID }}"
          if ! terraform -chdir=terraform/artifact-registry state show google_project_service.artifact_registry >/dev/null 2>&1; then
            if gcloud services list \
              --enabled \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --filter="name:artifactregistry.googleapis.com" \
              --format="value(name)" | grep -q "artifactregistry.googleapis.com"; then
              terraform -chdir=terraform/artifact-registry import \
                -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
                -var="gcp_region=${{ vars.GCP_REGION }}" \
                -var="artifact_registry_repository_id=${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}" \
                google_project_service.artifact_registry \
                "${{ vars.GCP_PROJECT_ID }}/artifactregistry.googleapis.com"
            fi
          fi
          if ! terraform -chdir=terraform/artifact-registry state show google_artifact_registry_repository.runtime >/dev/null 2>&1; then
            if gcloud artifacts repositories describe "${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}" \
              --location="${{ vars.GCP_REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
              terraform -chdir=terraform/artifact-registry import \
                -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
                -var="gcp_region=${{ vars.GCP_REGION }}" \
                -var="artifact_registry_repository_id=${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}" \
                google_artifact_registry_repository.runtime \
                "projects/${{ vars.GCP_PROJECT_ID }}/locations/${{ vars.GCP_REGION }}/repositories/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}"
            fi
          fi
          terraform -chdir=terraform/artifact-registry plan \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcp_region=${{ vars.GCP_REGION }}" \
            -var="artifact_registry_repository_id=${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}" \
            -out=tfplan
          terraform -chdir=terraform/artifact-registry apply -auto-approve tfplan

      - name: Grant production Artifact Registry readers
        if: ${{ inputs.promote_production }}
        shell: bash
        run: |
          set -euo pipefail
          production_project_id="${{ vars.PRODUCTION_GCP_PROJECT_ID }}"
          production_project_number="${{ vars.PRODUCTION_GCP_PROJECT_NUMBER }}"

          if [[ -z "${production_project_id}" || -z "${production_project_number}" ]]; then
            echo "PRODUCTION_GCP_PROJECT_ID and PRODUCTION_GCP_PROJECT_NUMBER repository variables are required for production promotion."
            exit 1
          fi

          readers=(
            "serviceAccount:production-valdrics-runtime@${production_project_id}.iam.gserviceaccount.com"
            "serviceAccount:production-valdrics-batch@${production_project_id}.iam.gserviceaccount.com"
            "serviceAccount:service-${production_project_number}@serverless-robot-prod.iam.gserviceaccount.com"
          )
          for member in "${readers[@]}"; do
            gcloud artifacts repositories add-iam-policy-binding "${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}" \
              --location="${{ vars.GCP_REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --member="${member}" \
              --role="roles/artifactregistry.reader" \
              --quiet
          done

  preflight-staging-managed-platform:
    name: Preflight Staging Managed Platform
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Validate managed runtime contract
        shell: bash
        env:
          RUNTIME_PLAIN_ENV_JSON: ${{ vars.RUNTIME_PLAIN_ENV_JSON }}
          RUNTIME_SECRET_ENV_JSON: ${{ secrets.RUNTIME_SECRET_ENV_JSON }}
        run: |
          set -euo pipefail
          python3 scripts/preflight_runtime_env_contract.py \
            --environment staging

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Enable required Google APIs early
        shell: bash
        run: |
          set -euo pipefail
          gcloud services enable \
            cloudbuild.googleapis.com \
            cloudresourcemanager.googleapis.com \
            cloudtasks.googleapis.com \
            cloudscheduler.googleapis.com \
            compute.googleapis.com \
            iam.googleapis.com \
            run.googleapis.com \
            secretmanager.googleapis.com \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      - name: Validate GCP deployer Terraform IAM permissions
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/preflight_gcp_managed_platform.py \
            --project-id "${{ vars.GCP_PROJECT_ID }}"

      - name: Enforce Cloudflare Bot Fight Mode disabled
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/preflight_cloudflare_bot_management.py \
            --cloudflare-zone-id "${{ vars.CLOUDFLARE_ZONE_ID }}"

      - name: Validate Supabase existing project binding
        shell: bash
        env:
          RUNTIME_PLAIN_ENV_JSON: ${{ vars.RUNTIME_PLAIN_ENV_JSON }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/preflight_managed_platform.py \
            --runtime-plain-env-json "${RUNTIME_PLAIN_ENV_JSON}" \
            --supabase-organization-id "${{ vars.SUPABASE_ORGANIZATION_ID }}" \
            --supabase-project-name "${{ vars.SUPABASE_PROJECT_NAME }}"

  preflight-production-managed-platform:
    name: Preflight Production Managed Platform
    if: ${{ inputs.promote_production }}
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Validate managed runtime contract
        shell: bash
        env:
          RUNTIME_PLAIN_ENV_JSON: ${{ vars.RUNTIME_PLAIN_ENV_JSON }}
          RUNTIME_SECRET_ENV_JSON: ${{ secrets.RUNTIME_SECRET_ENV_JSON }}
        run: |
          set -euo pipefail
          python3 scripts/preflight_runtime_env_contract.py \
            --environment production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Enable required Google APIs early
        shell: bash
        run: |
          set -euo pipefail
          gcloud services enable \
            cloudbuild.googleapis.com \
            cloudresourcemanager.googleapis.com \
            cloudtasks.googleapis.com \
            cloudscheduler.googleapis.com \
            compute.googleapis.com \
            iam.googleapis.com \
            run.googleapis.com \
            secretmanager.googleapis.com \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      - name: Validate GCP deployer Terraform IAM permissions
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/preflight_gcp_managed_platform.py \
            --project-id "${{ vars.GCP_PROJECT_ID }}"

      - name: Enforce Cloudflare Bot Fight Mode disabled
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/preflight_cloudflare_bot_management.py \
            --cloudflare-zone-id "${{ vars.CLOUDFLARE_ZONE_ID }}"

      - name: Validate Supabase existing project binding
        shell: bash
        env:
          RUNTIME_PLAIN_ENV_JSON: ${{ vars.RUNTIME_PLAIN_ENV_JSON }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/preflight_managed_platform.py \
            --runtime-plain-env-json "${RUNTIME_PLAIN_ENV_JSON}" \
            --supabase-organization-id "${{ vars.SUPABASE_ORGANIZATION_ID }}" \
            --supabase-project-name "${{ vars.SUPABASE_PROJECT_NAME }}"

  publish:
    name: Publish Backend Artifact
    needs:
      - validate
      - bootstrap-artifact-registry
      - preflight-staging-managed-platform
    uses: ./.github/workflows/publish-artifact-registry-images.yml
    with:
      release_tag: ${{ inputs.release_tag }}
      git_ref: ${{ inputs.git_ref || github.sha }}
      gcp_project_id: ${{ vars.ARTIFACT_REGISTRY_PROJECT_ID }}
      artifact_registry_region: ${{ vars.ARTIFACT_REGISTRY_REGION }}
      artifact_registry_repository: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
    secrets: inherit

  deploy-staging:
    name: Deploy Staging
    needs: publish
    uses: ./.github/workflows/deploy-unified-platform.yml
    with:
      environment: staging
      git_ref: ${{ inputs.git_ref || github.sha }}
      release_tag: ${{ inputs.release_tag }}
      api_promotion_ref: ${{ needs.publish.outputs.api_promotion_ref }}
      batch_promotion_ref: ${{ needs.publish.outputs.batch_promotion_ref }}
    secrets: inherit

  verify-staging-readiness:
    name: Verify Staging Release Readiness
    needs: deploy-staging
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Setup Dashboard Toolchain
        uses: ./.github/actions/setup-dashboard
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Cache Playwright Browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Download managed deployment bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: managed-deployment-bundle-staging-${{ inputs.release_tag }}
          path: .runtime

      - name: Refresh codebase audit report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .runtime
          uv run python3 scripts/refresh_codebase_audit_report.py \
            --report "reports/audit/staging.audit.report.json"

      - name: Verify managed release readiness
        shell: bash
        run: |
          set -euo pipefail
          uv run python3 scripts/verify_managed_release_readiness.py \
            --environment staging \
            --audit-report reports/audit/staging.audit.report.json \
            --runtime-report .runtime/staging.report.json \
            --migration-report .runtime/staging.migrate.report.json \
            --deployment-report .runtime/deploy/staging/deployment.report.json \
            --non-secret-deployment-bundle \
            --skip-webserver

  deploy-production:
    name: Promote Production
    if: ${{ inputs.promote_production }}
    needs:
      - publish
      - deploy-staging
      - bootstrap-production-terraform-state
      - preflight-production-managed-platform
    uses: ./.github/workflows/deploy-unified-platform.yml
    with:
      environment: production
      git_ref: ${{ inputs.git_ref || github.sha }}
      release_tag: ${{ inputs.release_tag }}
      api_promotion_ref: ${{ needs.publish.outputs.api_promotion_ref }}
      batch_promotion_ref: ${{ needs.publish.outputs.batch_promotion_ref }}
    secrets: inherit

  bootstrap-production-terraform-state:
    name: Bootstrap Production Terraform State
    if: ${{ inputs.promote_production }}
    needs: deploy-staging
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform apply state backend foundation
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/state-backend init
          if ! terraform -chdir=terraform/state-backend state show google_project_service.storage >/dev/null 2>&1; then
            if gcloud services list \
              --enabled \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --filter="name:storage.googleapis.com" \
              --format="value(name)" | grep -q "storage.googleapis.com"; then
              terraform -chdir=terraform/state-backend import \
                -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
                -var="gcp_region=${{ vars.GCP_REGION }}" \
                -var="state_bucket_name=${{ vars.TERRAFORM_STATE_BUCKET }}" \
                -var='terraform_state_principals=["serviceAccount:${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}"]' \
                google_project_service.storage \
                "${{ vars.GCP_PROJECT_ID }}/storage.googleapis.com"
            fi
          fi
          if ! terraform -chdir=terraform/state-backend state show google_storage_bucket.terraform_state >/dev/null 2>&1; then
            if gcloud storage buckets describe "gs://${{ vars.TERRAFORM_STATE_BUCKET }}" >/dev/null 2>&1; then
              terraform -chdir=terraform/state-backend import \
                -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
                -var="gcp_region=${{ vars.GCP_REGION }}" \
                -var="state_bucket_name=${{ vars.TERRAFORM_STATE_BUCKET }}" \
                -var='terraform_state_principals=["serviceAccount:${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}"]' \
                google_storage_bucket.terraform_state \
                "${{ vars.TERRAFORM_STATE_BUCKET }}"
            fi
          fi
          terraform -chdir=terraform/state-backend plan \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcp_region=${{ vars.GCP_REGION }}" \
            -var="state_bucket_name=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -var='terraform_state_principals=["serviceAccount:${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}"]' \
            -out=tfplan
          terraform -chdir=terraform/state-backend apply -auto-approve tfplan

  verify-production-readiness:
    name: Verify Production Release Readiness
    if: ${{ inputs.promote_production }}
    needs: deploy-production
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Setup Dashboard Toolchain
        uses: ./.github/actions/setup-dashboard
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Cache Playwright Browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Download managed deployment bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: managed-deployment-bundle-production-${{ inputs.release_tag }}
          path: .runtime

      - name: Refresh codebase audit report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .runtime
          uv run python3 scripts/refresh_codebase_audit_report.py \
            --report ".runtime/production.audit.report.json"

      - name: Verify managed release readiness
        shell: bash
        run: |
          set -euo pipefail
          uv run python3 scripts/verify_managed_release_readiness.py \
            --environment production \
            --audit-report .runtime/production.audit.report.json \
            --runtime-report .runtime/production.report.json \
            --migration-report .runtime/production.migrate.report.json \
            --deployment-report .runtime/deploy/production/deployment.report.json \
            --non-secret-deployment-bundle \
            --skip-webserver

  render-release-blocker-summary:
    name: Render Managed Release Blocker Summary
    if: ${{ inputs.promote_production }}
    needs:
      - verify-staging-readiness
      - verify-production-readiness
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Download staging managed deployment bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: managed-deployment-bundle-staging-${{ inputs.release_tag }}
          path: .runtime

      - name: Download production managed deployment bundle
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: managed-deployment-bundle-production-${{ inputs.release_tag }}
          path: .runtime

      - name: Render cross-environment blocker summary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .runtime/deploy
          uv run python3 scripts/render_managed_release_blocker_summary.py \
            --staging-runtime-report .runtime/staging.report.json \
            --staging-migration-report .runtime/staging.migrate.report.json \
            --staging-deployment-report .runtime/deploy/staging/deployment.report.json \
            --production-runtime-report .runtime/production.report.json \
            --production-migration-report .runtime/production.migrate.report.json \
            --production-deployment-report .runtime/deploy/production/deployment.report.json \
            --non-secret-deployment-bundle \
            --output .runtime/deploy/managed-release-blockers.md

      - name: Upload managed release blocker summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: managed-release-blocker-summary-${{ inputs.release_tag }}
          path: .runtime/deploy/managed-release-blockers.md
          retention-days: 30
