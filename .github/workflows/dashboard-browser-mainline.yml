name: Dashboard Mainline Browser Gates

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "dashboard/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "dashboard/package.json"
      - "dashboard/pnpm-lock.yaml"
      - ".github/workflows/dashboard-browser-mainline.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24.14.0"
  PNPM_VERSION: "10.32.1"
  UV_VERSION: "0.10.9"

jobs:
  dashboard-browser-gates:
    name: Dashboard ${{ matrix.label }}
    runs-on: ubuntu-24.04
    env:
      PUBLIC_API_URL: "https://api.example.com/api/v1"
      PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      PUBLIC_SUPABASE_ANON_KEY: "ci-public-anon-key"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Authenticated Shell
            spec: e2e/authenticated-shell.spec.ts
            artifact: playwright-report-authenticated-shell
          - label: E2E Critical Paths
            spec: e2e/critical-paths.spec.ts
            artifact: playwright-report-critical
          - label: Accessibility Gate
            spec: e2e/a11y.spec.ts
            artifact: playwright-report-a11y
          - label: Performance Gate
            spec: e2e/performance.spec.ts
            artifact: playwright-report-perf
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python (for backend)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install Backend Dependencies
        run: uv sync --locked --dev

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Cache pnpm dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Dashboard Dependencies
        working-directory: ./dashboard
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright Browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright Suite
        working-directory: ./dashboard
        run: pnpm exec playwright test ${{ matrix.spec }} --reporter=html
        env:
          DASHBOARD_URL: http://localhost:4173
          API_URL: http://127.0.0.1:8000

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: ${{ matrix.artifact }}
          path: dashboard/playwright-report/
          retention-days: 7
