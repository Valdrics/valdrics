name: Performance Gate (Manual)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL of the environment to test (for example: https://staging.valdrics.ai)"
        required: true
        default: "http://127.0.0.1:8000"
      profile:
        description: "Endpoint profile"
        required: true
        type: choice
        options:
          - health
          - health_deep
          - dashboard
          - ops
          - scale
          - soak
        default: "dashboard"
      duration:
        description: "Duration (seconds)"
        required: true
        default: "30"
      users:
        description: "Concurrent users"
        required: true
        default: "10"
      ramp:
        description: "Ramp-up (seconds)"
        required: true
        default: "5"
      p95_target:
        description: "Fail if p95 exceeds this (seconds)"
        required: true
        default: "2.0"
      max_error_rate:
        description: "Fail if error-rate exceeds this (percent)"
        required: true
        default: "1.0"
      min_throughput:
        description: "Fail if throughput is below this (requests/sec)"
        required: false
        default: ""
      start_local_api:
        description: "Launch the local API inside the workflow before running the gate"
        required: false
        type: boolean
        default: false
      bootstrap_tenant:
        description: "Create a local authenticated tenant when running authenticated profiles"
        required: false
        type: boolean
        default: false
      bootstrap_tier:
        description: "Local tenant tier to assign after bootstrap"
        required: false
        default: "free"
  workflow_call:
    inputs:
      url:
        required: false
        type: string
        default: "http://127.0.0.1:8000"
      profile:
        required: false
        type: string
        default: "dashboard"
      duration:
        required: false
        type: string
        default: "30"
      users:
        required: false
        type: string
        default: "10"
      ramp:
        required: false
        type: string
        default: "5"
      p95_target:
        required: false
        type: string
        default: "2.0"
      max_error_rate:
        required: false
        type: string
        default: "1.0"
      min_throughput:
        required: false
        type: string
        default: ""
      start_local_api:
        required: false
        type: boolean
        default: false
      bootstrap_tenant:
        required: false
        type: boolean
        default: false
      bootstrap_tier:
        required: false
        type: string
        default: "free"
    secrets:
      VALDRICS_TOKEN:
        required: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.10.9"
  ENVIRONMENT: "staging"
  TESTING: "false"
  DEBUG: "false"
  DATABASE_URL: "postgresql+asyncpg://postgres:local-dev-change-me@127.0.0.1:5432/valdrics"
  DB_SSL_MODE: "disable"
  API_URL: "https://api.staging.valdrics.example"
  FRONTEND_URL: "https://dashboard.staging.valdrics.example"
  CSRF_SECRET_KEY: "ci-csrf-secret-key-32-chars-min-000000"
  ENCRYPTION_KEY: "ci-encryption-key-32-chars-min-00000000"
  KDF_SALT: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
  SUPABASE_JWT_SECRET: "ci-supabase-jwt-secret-32-chars-0000"
  ENFORCEMENT_APPROVAL_TOKEN_SECRET: "ci-enforcement-approval-secret-0000000000"
  ENFORCEMENT_EXPORT_SIGNING_SECRET: "ci-enforcement-export-signing-secret-0000"
  ADMIN_API_KEY: "ci-admin-api-key-32-chars-min-0000000"
  GROQ_API_KEY: "testing"
  PAYSTACK_SECRET_KEY: "example_paystack_secret_ci_validation_only"
  PAYSTACK_PUBLIC_KEY: "example_paystack_public_ci_validation_only"
  REDIS_URL: "redis://localhost:6379/0"
  SENTRY_DSN: "https://example@sentry.io/1"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://127.0.0.1:4317"
  OTEL_LOGS_EXPORT_ENABLED: "true"
  APP_RUNTIME_DATA_DIR: "/tmp/valdrics"
  ENABLE_SCHEDULER: "true"
  TRUST_PROXY_HEADERS: "true"
  TRUSTED_PROXY_CIDRS: '["127.0.0.1/32"]'

jobs:
  gate:
    name: Run Load-Test Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      OPTIONAL_VALDRICS_TOKEN: ${{ secrets.VALDRICS_TOKEN }}
    services:
      postgres:
        image: postgres:16.13-alpine
        env:
          POSTGRES_DB: valdrics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: local-dev-change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d valdrics"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.2.13-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      otel-collector:
        image: otel/opentelemetry-collector:0.147.0
        ports:
          - 4317:4317
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install Dependencies
        run: uv sync --locked --dev

      - name: Export Strict-Environment Forecast Break-Glass Metadata
        run: |
          set -euo pipefail
          echo "FORECASTER_ALLOW_HOLT_WINTERS_FALLBACK=true" >> "$GITHUB_ENV"
          echo "FORECASTER_BREAK_GLASS_REASON=CI staging validation without Prophet wheel" >> "$GITHUB_ENV"
          python3 - <<'PY'
          from datetime import datetime, timedelta, timezone
          import os
          expires_at = (datetime.now(timezone.utc) + timedelta(hours=6)).isoformat().replace("+00:00", "Z")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"FORECASTER_BREAK_GLASS_EXPIRES_AT={expires_at}\n")
          PY

      - name: Wait for OTEL Collector
        run: |
          python3 - <<'PY'
          import socket
          import time

          deadline = time.time() + 30
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 4317), timeout=2):
                      raise SystemExit(0)
              except OSError:
                  time.sleep(1)
          raise SystemExit("otel collector failed to become ready on 127.0.0.1:4317")
          PY

      - name: Runtime Env Preflight
        run: uv run python scripts/validate_runtime_env.py --environment staging

      - name: Apply Database Migrations
        if: ${{ inputs.start_local_api }}
        run: uv run alembic upgrade head

      - name: Launch Local API
        if: ${{ inputs.start_local_api }}
        run: |
          set -euo pipefail
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/valdrics-perf.log 2>&1 &
          echo $! > /tmp/valdrics-perf.pid

      - name: Launch Local Worker
        if: ${{ inputs.start_local_api }}
        run: |
          set -euo pipefail
          uv run celery -A app.shared.core.celery_app:celery_app worker -l info > /tmp/valdrics-perf-worker.log 2>&1 &
          echo $! > /tmp/valdrics-perf-worker.pid

      - name: Wait for Local API
        if: ${{ inputs.start_local_api }}
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/health/live"
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("performance gate API failed to become ready within 60 seconds")
          PY

      - name: Bootstrap Local Tenant Token
        if: ${{ inputs.bootstrap_tenant }}
        run: |
          set -euo pipefail
          BOOTSTRAP_ARGS=(
            --url http://127.0.0.1:8000
            --tenant-name "Performance Validation Tenant"
            --email "performance.owner@valdrics.ai"
            --tier "${{ inputs.bootstrap_tier }}"
          )
          TOKEN="$(uv run python scripts/bootstrap_performance_tenant.py "${BOOTSTRAP_ARGS[@]}")"
          echo "VALDRICS_TOKEN=${TOKEN}" >> "$GITHUB_ENV"

      - name: Export Provided Performance Token
        if: ${{ !inputs.bootstrap_tenant && env.OPTIONAL_VALDRICS_TOKEN != '' }}
        run: |
          echo "VALDRICS_TOKEN=${OPTIONAL_VALDRICS_TOKEN}" >> "$GITHUB_ENV"

      - name: Run Load Test (Enforced Thresholds)
        run: |
          set -euo pipefail
          OUT="reports/performance/perf_gate_${{ github.run_id }}.json"
          mkdir -p "$(dirname "$OUT")"

          ARGS=(--url "${{ inputs.url }}" --profile "${{ inputs.profile }}" --duration "${{ inputs.duration }}" --users "${{ inputs.users }}" --ramp "${{ inputs.ramp }}" --out "$OUT")
          ARGS+=(--p95-target "${{ inputs.p95_target }}" --max-error-rate "${{ inputs.max_error_rate }}" --enforce-thresholds)
          if [ -n "${{ inputs.min_throughput }}" ]; then
            ARGS+=(--min-throughput "${{ inputs.min_throughput }}")
          fi

          uv run python scripts/load_test_api.py "${ARGS[@]}"

      - name: Upload Performance Evidence Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-gate-evidence-${{ inputs.profile }}
          path: reports/performance/perf_gate_${{ github.run_id }}.json
          retention-days: 14

      - name: Upload Local API Log
        if: ${{ always() && inputs.start_local_api }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-gate-api-log-${{ inputs.profile }}
          path: /tmp/valdrics-perf.log
          retention-days: 14

      - name: Upload Local Worker Log
        if: ${{ always() && inputs.start_local_api }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-gate-worker-log-${{ inputs.profile }}
          path: /tmp/valdrics-perf-worker.log
          retention-days: 14

      - name: Stop Local API
        if: ${{ always() && inputs.start_local_api }}
        run: |
          if [ -f /tmp/valdrics-perf.pid ]; then
            kill "$(cat /tmp/valdrics-perf.pid)" || true
          fi

      - name: Stop Local Worker
        if: ${{ always() && inputs.start_local_api }}
        run: |
          if [ -f /tmp/valdrics-perf-worker.pid ]; then
            kill "$(cat /tmp/valdrics-perf-worker.pid)" || true
          fi
