name: Valdrics CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Performance: Cancel in-flight runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Security: Restrict permissions to least privilege
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24.14.0"
  PNPM_VERSION: "10.32.1"
  UV_VERSION: "0.10.9"
  COVERAGE_VERSION: "7.13.4"
  TRIVY_IMAGE: "docker.io/aquasec/trivy:0.69.3"

jobs:
  classify-changes:
    name: Classify CI Surfaces
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      backend_ci: ${{ steps.classify.outputs.backend_ci }}
      dashboard_ci: ${{ steps.classify.outputs.dashboard_ci }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          backend_ci=false
          dashboard_ci=false

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            base_sha=""
            head_sha=""
          fi

          if [[ -z "${base_sha}" || -z "${head_sha}" ]]; then
            backend_ci=true
            dashboard_ci=true
          else
            mapfile -t changed_files < <(git diff --name-only "${base_sha}" "${head_sha}")

            if [[ ${#changed_files[@]} -eq 0 ]]; then
              backend_ci=true
              dashboard_ci=true
            else
              for path in "${changed_files[@]}"; do
                case "${path}" in
                  .github/workflows/ci.yml)
                    backend_ci=true
                    dashboard_ci=true
                    ;;
                  app/*|tests/*|migrations/*|alembic.ini|pyproject.toml|uv.lock|scripts/*)
                    backend_ci=true
                    ;;
                  dashboard/*|scripts/check_frontend_api_contracts.py|scripts/check_frontend_hygiene.py|scripts/verify_dashboard_runtime_contract.py|scripts/verify_frontend_module_size_budget.py)
                    dashboard_ci=true
                    ;;
                esac
              done
            fi
          fi

          {
            echo "backend_ci=${backend_ci}"
            echo "dashboard_ci=${dashboard_ci}"
          } >> "${GITHUB_OUTPUT}"

  # JOB 1: QUALITY ASSURANCE
  quality:
    name: Backend Quality Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      # Default test-runtime contract (step-level env can override as needed).
      ENVIRONMENT: "development"
      TESTING: "true"
      DEBUG: "false"
      DB_SSL_MODE: "require"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      CSRF_SECRET_KEY: "ci-csrf-secret-key-32-chars-min-000000"
      ENCRYPTION_KEY: "ci-encryption-key-32-chars-min-00000000"
      KDF_SALT: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      SUPABASE_JWT_SECRET: "ci-supabase-jwt-secret-32-chars-0000"
      ENFORCEMENT_APPROVAL_TOKEN_SECRET: "ci-enforcement-approval-secret-0000000000"
      ENFORCEMENT_EXPORT_SIGNING_SECRET: "ci-enforcement-export-signing-secret-0000"
      ADMIN_API_KEY: "ci-admin-api-key-32-chars-min-0000000"
      TRUST_PROXY_HEADERS: "true"
      TRUSTED_PROXY_HOPS: "1"
      TRUSTED_PROXY_CIDRS: '["127.0.0.1/32"]'
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
      AWS_DEFAULT_REGION: "us-east-1"
      GROQ_API_KEY: "testing"
      CODECARBON_LOG_LEVEL: "info"
    steps:
      - &checkout_code_step
        name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Runtime Env Preflight (Strict Contract)
        env:
          ENVIRONMENT: "production"
          PLATFORM_RUNTIME_PROFILE: "gcp"
          OBSERVABILITY_BACKEND: "gcp"
          TESTING: "false"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost/test"
          API_URL: "https://api.validation.example.com"
          FRONTEND_URL: "https://app.validation.example.com"
          GCP_PROJECT_ID: "valdrics-validation"
          GCP_REGION: "us-central1"
          GCP_CLOUD_TASKS_QUEUE: "valdrics-managed-work"
          GCP_CLOUD_TASKS_INVOKER_SERVICE_ACCOUNT_EMAIL: "tasks-invoker@valdrics-validation.iam.gserviceaccount.com"
          GCP_CLOUD_RUN_BATCH_JOB_NAME: "valdrics-batch"
          GCP_CLOUD_RUN_SERVICE_NAME: "valdrics-api"
          GCP_INTERNAL_BASE_URL: "https://valdrics-api-validation.run.app"
          GCP_INTERNAL_ALLOWED_SERVICE_ACCOUNTS: '["tasks-invoker@valdrics-validation.iam.gserviceaccount.com","scheduler-invoker@valdrics-validation.iam.gserviceaccount.com"]'
          CSRF_SECRET_KEY: "ci-csrf-secret-key-32-chars-min-000000"
          ENCRYPTION_KEY: "ci-encryption-key-32-chars-min-00000000"
          KDF_SALT: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
          SUPABASE_JWT_SECRET: "ci-supabase-jwt-secret-32-chars-0000"
          ENFORCEMENT_APPROVAL_TOKEN_SECRET: "ci-enforcement-approval-secret-0000000000"
          ENFORCEMENT_EXPORT_SIGNING_SECRET: "ci-enforcement-export-signing-secret-0000"
          ADMIN_API_KEY: "ci-admin-api-key-32-chars-min-0000000"
          LLM_PROVIDER: "groq"
          GROQ_API_KEY: "testing"
          PAYSTACK_SECRET_KEY: "example_paystack_secret_ci_validation_only"
          PAYSTACK_PUBLIC_KEY: "example_paystack_public_ci_validation_only"
          ALLOW_SYNTHETIC_BILLING_KEYS_FOR_VALIDATION: "true"
          PUBLIC_API_RATE_LIMITING_BACKEND: "cloudflare"
          RATELIMIT_ENABLED: "false"
          SAAS_STRICT_INTEGRATIONS: "true"
          SLACK_CHANNEL_ID: ""
          JIRA_BASE_URL: ""
          GITHUB_ACTIONS_TOKEN: ""
          CORS_ORIGINS: '["https://app.validation.example.com"]'
          FORECASTER_ALLOW_HOLT_WINTERS_FALLBACK: "true"
          FORECASTER_BREAK_GLASS_REASON: "CI preflight while prophet is not bundled."
        run: |
          export FORECASTER_BREAK_GLASS_EXPIRES_AT="$(python - <<'PY'
          from datetime import datetime, timedelta, timezone
          print(
              (datetime.now(timezone.utc) + timedelta(hours=4))
              .replace(microsecond=0)
              .isoformat()
              .replace('+00:00', 'Z')
          )
          PY
          )"
          uv run python scripts/validate_runtime_env.py --environment production

      - name: Run Linting (Ruff)
        run: uv run ruff check .

      - name: Enforce Enterprise Placeholder Guard (Control-Plane Paths)
        run: uv run python3 scripts/verify_enterprise_placeholder_guards.py --profile strict

      - name: Enforce Repository Root Hygiene
        run: uv run python3 scripts/verify_repo_root_hygiene.py

      - name: Enforce Environment Hygiene
        run: uv run python3 scripts/verify_env_hygiene.py

      - name: Enforce Dependency Lock Discipline
        run: uv run python3 scripts/verify_dependency_locking.py

      - name: Enforce Python Dependency Vulnerability Gate (pip-audit)
        run: uv run pip-audit --ignore-vuln CVE-2026-1703

      - name: Enforce Adapter Test Coverage
        run: uv run python3 scripts/verify_adapter_test_coverage.py

      - name: Enforce Python Complexity Budget (McCabe)
        run: uv run ruff check app --select C901 --config lint.mccabe.max-complexity=30

      - name: Enforce Python Module Size Budget
        run: uv run python3 scripts/verify_python_module_size_budget.py --emit-preferred-signals --emit-cluster-signals

      - name: Enforce Python Preferred Module Size Baseline
        run: uv run python3 scripts/verify_python_module_preferred_budget_baseline.py

      - name: Enforce Exception Governance Baseline
        run: uv run python3 scripts/verify_exception_governance.py

      - name: Enforce Documentation Runtime Contracts
        run: uv run python3 scripts/verify_documentation_runtime_contracts.py

      - name: Enforce Reports Archive Hygiene
        run: uv run python3 scripts/verify_reports_archive_hygiene.py

      - name: Verify Codebase Audit Report
        run: uv run python3 scripts/verify_codebase_audit_report.py --report reports/audit/staging.audit.report.json

      - name: Verify Frontend API Contracts
        run: uv run python scripts/check_frontend_api_contracts.py

      - name: Verify Frontend Hygiene
        run: uv run python scripts/check_frontend_hygiene.py

      - name: Enforce Frontend Module Size Budget
        run: uv run python3 scripts/verify_frontend_module_size_budget.py

  pytest:
    name: Backend Pytest Shard ${{ matrix.shard_id }}
    needs: [classify-changes]
    if: github.event_name != 'pull_request' || needs.classify-changes.outputs.backend_ci == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_id: "1"
            paths: >-
              tests/billing
              tests/contract
              tests/integration
              tests/security
              tests/unit/api
              tests/unit/connections
              tests/unit/db
              tests/unit/lead_gen
              tests/unit/models
              tests/unit/ops
              tests/unit/schemas
              tests/unit/scripts
              tests/unit/test_hard_cap_service.py
              tests/unit/test_main_basic.py
              tests/unit/test_main_coverage.py
              tests/unit/test_pricing_phase36.py
          - shard_id: "2"
            paths: >-
              tests/api
              tests/core
              tests/unit/reporting
              tests/unit/analysis
              tests/unit/core
              tests/unit/notifications
              tests/unit/shared
          - shard_id: "3"
            paths: >-
              tests/governance
              tests/unit/governance
              tests/unit/remediation
              tests/unit/services
              tests/unit/tasks
          - shard_id: "4"
            paths: >-
              tests/unit/adapters
              tests/unit/enforcement
              tests/unit/llm
              tests/unit/modules
              tests/unit/optimization
              tests/unit/supply_chain
              tests/unit/zombies
    env:
      ENVIRONMENT: "development"
      TESTING: "true"
      DEBUG: "false"
      DB_SSL_MODE: "require"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      CSRF_SECRET_KEY: "ci-csrf-secret-key-32-chars-min-000000"
      ENCRYPTION_KEY: "ci-encryption-key-32-chars-min-00000000"
      KDF_SALT: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      SUPABASE_JWT_SECRET: "ci-supabase-jwt-secret-32-chars-0000"
      ENFORCEMENT_APPROVAL_TOKEN_SECRET: "ci-enforcement-approval-secret-0000000000"
      ENFORCEMENT_EXPORT_SIGNING_SECRET: "ci-enforcement-export-signing-secret-0000"
      ADMIN_API_KEY: "ci-admin-api-key-32-chars-min-0000000"
      TRUST_PROXY_HEADERS: "true"
      TRUSTED_PROXY_HOPS: "1"
      TRUSTED_PROXY_CIDRS: '["127.0.0.1/32"]'
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
      AWS_DEFAULT_REGION: "us-east-1"
      GROQ_API_KEY: "testing"
      CODECARBON_LOG_LEVEL: "info"
      COVERAGE_DIR: "/tmp/coverage/${{ matrix.shard_id }}"
      COVERAGE_FILE: "/tmp/coverage/${{ matrix.shard_id }}/.coverage.${{ matrix.shard_id }}"
    steps:
      - *checkout_code_step
      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Run Pytest Shard with Coverage Data
        run: |
          mkdir -p "$COVERAGE_DIR"
          uv run pytest -q --cov=app --cov-report= ${{ matrix.paths }}

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-coverage-${{ matrix.shard_id }}
          path: ${{ env.COVERAGE_DIR }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7

  test:
    # Keep this name aligned with the required branch-protection check.
    name: Run Unit Tests
    runs-on: ubuntu-24.04
    needs: [classify-changes, pytest]
    if: always() && (github.event_name != 'pull_request' || needs.classify-changes.outputs.backend_ci == 'true')
    timeout-minutes: 20
    steps:
      - name: Require Successful Backend Pytest Shards
        if: needs.pytest.result != 'success'
        run: |
          echo "Backend pytest shards did not complete successfully."
          exit 1

      - *checkout_code_step
      - name: Setup Coverage Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: ""

      - name: Download Coverage Data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: backend-coverage-*
          path: reports/coverage/shards
          merge-multiple: true

      - name: Combine Coverage Data
        run: |
          uvx --from "coverage[toml]==${{ env.COVERAGE_VERSION }}" coverage combine reports/coverage/shards
          uvx --from "coverage[toml]==${{ env.COVERAGE_VERSION }}" coverage xml -o coverage.xml

      - name: Enforce Global Coverage Gate (90%)
        run: |
          uvx --from "coverage[toml]==${{ env.COVERAGE_VERSION }}" coverage report --include="app/*" --fail-under=90

      - name: Run Focused Coverage Gate (Optimization/Reporting/LLM Scheduler)
        run: |
          uvx --from "coverage[toml]==${{ env.COVERAGE_VERSION }}" coverage report \
            --include="*/app/modules/optimization/domain/remediation*.py,*/app/modules/optimization/domain/cloud_api_budget.py" \
            --fail-under=80
          uvx --from "coverage[toml]==${{ env.COVERAGE_VERSION }}" coverage report \
            --include="*/app/modules/reporting/domain/anomaly_detection.py,*/app/modules/reporting/domain/budget_alerts.py,*/app/modules/reporting/domain/calculator.py,*/app/modules/reporting/domain/leadership_kpis.py,*/app/modules/reporting/domain/service.py" \
            --fail-under=85
          uvx --from "coverage[toml]==${{ env.COVERAGE_VERSION }}" coverage report \
            --include="*/app/shared/llm/hybrid_scheduler.py" \
            --fail-under=95

      - name: Upload Coverage Report
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # JOB 1A: ALEMBIC FORWARD/ROLLBACK SMOKE
  migration-smoke:
    name: Alembic Upgrade/Downgrade Smoke
    needs: [classify-changes]
    if: github.event_name != 'pull_request' || needs.classify-changes.outputs.backend_ci == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16.13-alpine
        env:
          POSTGRES_DB: valdrics_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d valdrics_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TESTING: "true"
      ENVIRONMENT: "development"
      DEBUG: "false"
      DB_SSL_MODE: "disable"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/valdrics_ci"
      CSRF_SECRET_KEY: "ci-csrf-secret-key-32-chars-min-000000"
      ENCRYPTION_KEY: "ci-encryption-key-32-chars-min-00000000"
      KDF_SALT: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      SUPABASE_JWT_SECRET: "ci-supabase-jwt-secret-32-chars-0000"
      ADMIN_API_KEY: "ci-admin-api-key-32-chars-min-0000000"
      GROQ_API_KEY: "testing"
      PAYSTACK_SECRET_KEY: "sk_test_ci"
      PAYSTACK_PUBLIC_KEY: "pk_test_ci"
    steps:
      - *checkout_code_step
      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Run Alembic Forward/Rollback Smoke
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade -1
          uv run alembic upgrade head

  # JOB 1C: TYPE SAFETY (2026 Strict Standards)
  type-check:
    name: Backend Type Check (Mypy)
    needs: [classify-changes]
    if: github.event_name != 'pull_request' || needs.classify-changes.outputs.backend_ci == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - *checkout_code_step
      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Run Mypy
        run: uv run mypy app

  # JOB 1B: DASHBOARD QUALITY (2026 Frontend Standards)
  dashboard-quality:
    name: Dashboard Lint / Typecheck / Unit
    needs: [classify-changes]
    if: github.event_name != 'pull_request' || needs.classify-changes.outputs.dashboard_ci == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      # Required so `$env/static/public` exports are available during
      # `svelte-kit sync` and type generation in CI.
      PUBLIC_API_URL: "https://api.example.com/api/v1"
      PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      PUBLIC_SUPABASE_ANON_KEY: "ci-public-anon-key"
    steps:
      - *checkout_code_step
      - name: Setup Dashboard Toolchain
        uses: ./.github/actions/setup-dashboard
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Dashboard Lint
        working-directory: ./dashboard
        run: pnpm run lint

      - name: Dashboard Typecheck
        working-directory: ./dashboard
        run: pnpm run check

      - name: Dashboard Unit Tests
        working-directory: ./dashboard
        run: pnpm run test:unit -- --run

      - name: Dashboard Build (Vite/SvelteKit)
        working-directory: ./dashboard
        run: pnpm run build

      - name: Package Dashboard Preview Build
        working-directory: ./dashboard
        run: |
          tar -czf "${RUNNER_TEMP}/dashboard-preview-output.tar.gz" .svelte-kit/output

      - name: Upload Dashboard Preview Build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dashboard-preview-output
          path: ${{ runner.temp }}/dashboard-preview-output.tar.gz
          if-no-files-found: error
          retention-days: 3

      - name: Verify Dashboard Managed Runtime Contract
        run: python3 scripts/verify_dashboard_runtime_contract.py

      - name: Dashboard Bundle Budgets
        working-directory: ./dashboard
        run: pnpm run check:bundle

  dashboard-public-browser-gates:
    name: Dashboard Public ${{ matrix.label }}
    runs-on: ubuntu-24.04
    needs: [classify-changes, dashboard-quality]
    if: github.event_name != 'pull_request' || needs.classify-changes.outputs.dashboard_ci == 'true'
    timeout-minutes: 30
    env:
      PUBLIC_API_URL: "https://api.example.com/api/v1"
      PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      PUBLIC_SUPABASE_ANON_KEY: "ci-public-anon-key"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Marketing Smoke
            spec: e2e/public-marketing.spec.ts
            artifact: playwright-report-public-marketing
          - label: Accessibility Gate
            spec: e2e/public-a11y.spec.ts
            artifact: playwright-report-public-a11y
          - label: Performance Gate
            spec: e2e/performance.spec.ts
            artifact: playwright-report-public-perf
          - label: Layout Audit
            spec: e2e/landing-layout-audit.spec.ts
            artifact: playwright-report-public-layout
          - label: Progressive Enhancement Gate
            spec: e2e/public-progressive-enhancement.spec.ts
            artifact: playwright-report-public-progressive
    steps:
      - *checkout_code_step
      - name: Setup Dashboard Toolchain
        uses: ./.github/actions/setup-dashboard
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Download Dashboard Preview Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dashboard-preview-output
          path: ${{ runner.temp }}/dashboard-preview-output

      - name: Restore Dashboard Preview Build
        working-directory: ./dashboard
        run: |
          rm -rf .svelte-kit/output
          tar -xzf "${RUNNER_TEMP}/dashboard-preview-output/dashboard-preview-output.tar.gz"

      - name: Cache Playwright Browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: playwright-cache-public
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache-public.outputs.cache-hit != 'true'
        working-directory: ./dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Public Playwright Suite
        working-directory: ./dashboard
        run: pnpm exec playwright test ${{ matrix.spec }} --reporter=html
        env:
          PLAYWRIGHT_PUBLIC_ONLY: "1"
          PLAYWRIGHT_USE_PREBUILT_PREVIEW: "1"
          DASHBOARD_URL: http://localhost:4173

      - name: Upload Public Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: ${{ matrix.artifact }}
          path: dashboard/playwright-report/
          retention-days: 7
