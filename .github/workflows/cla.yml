name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: read
  statuses: write

env:
  CLA_SIGNATURES_PATH: signatures/version1/cla.json
  CLA_SIGNATURES_BRANCH: cla-signatures
  CLA_SIGN_PHRASE: I have read the CLA Document and I hereby sign the CLA
  CLA_ALLOWLIST: dependabot[bot],renovate[bot],github-actions[bot]
  CLA_STATUS_CONTEXT: cla-assistant

jobs:
  cla-assistant:
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (github.event.comment.body == 'recheck' ||
      github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Run In-Repo CLA Assistant
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          python3 scripts/cla_assistant.py \
            --signatures-path "${CLA_SIGNATURES_PATH}" \
            --signatures-branch "${CLA_SIGNATURES_BRANCH}" \
            --sign-phrase "${CLA_SIGN_PHRASE}" \
            --allowlist "${CLA_ALLOWLIST}" \
            --status-context "${CLA_STATUS_CONTEXT}"
