name: Deploy Unified Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment."
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: "Git ref to deploy."
        required: false
        type: string
      release_tag:
        description: "Immutable release tag recorded in the managed deployment bundle."
        required: true
        type: string
      api_promotion_ref:
        description: "Digest-pinned Artifact Registry ref for the API service."
        required: true
        type: string
      batch_promotion_ref:
        description: "Digest-pinned Artifact Registry ref for the Cloud Run batch job."
        required: true
        type: string
      apply_infrastructure:
        description: "Apply Terraform-managed infrastructure before deploying app images."
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: "Target environment."
        required: true
        type: string
      git_ref:
        description: "Git ref to deploy."
        required: false
        type: string
      release_tag:
        description: "Immutable release tag recorded in the managed deployment bundle."
        required: true
        type: string
      api_promotion_ref:
        description: "Digest-pinned Artifact Registry ref for the API service."
        required: true
        type: string
      batch_promotion_ref:
        description: "Digest-pinned Artifact Registry ref for the Cloud Run batch job."
        required: true
        type: string
      apply_infrastructure:
        description: "Apply Terraform-managed infrastructure before deploying app images."
        required: false
        default: true
        type: boolean
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_DEPLOYER_SERVICE_ACCOUNT:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      SUPABASE_ACCESS_TOKEN:
        required: true
      SUPABASE_DATABASE_PASSWORD:
        required: true
      RUNTIME_SECRET_ENV_JSON:
        required: true

concurrency:
  group: deploy-unified-platform-${{ inputs.environment }}-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24.14.0"
  PNPM_VERSION: "10.32.1"
  UV_VERSION: "0.10.9"

jobs:
  deploy:
    name: Deploy Backend, Infra, and Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      DEPLOY_DIR: .runtime/deploy/${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Set up Terraform
        if: ${{ inputs.apply_infrastructure }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Setup Backend Toolchain
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          dependency-install-command: uv sync --locked --dev

      - name: Materialize managed runtime env from GitHub contract
        shell: bash
        env:
          RUNTIME_PLAIN_ENV_JSON: ${{ vars.RUNTIME_PLAIN_ENV_JSON }}
          RUNTIME_SECRET_ENV_JSON: ${{ secrets.RUNTIME_SECRET_ENV_JSON }}
        run: |
          set -euo pipefail
          mkdir -p .runtime
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path
          import shlex

          from scripts.managed_deployment_contract import (
              runtime_json_classification_errors,
          )

          def load_payload(name: str) -> dict[str, str]:
              raw = os.environ.get(name, "")
              try:
                  payload = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{name} must be valid JSON: {exc}") from exc
              if not isinstance(payload, dict):
                  raise SystemExit(f"{name} must be a JSON object")

              normalized: dict[str, str] = {}
              for raw_key, raw_value in payload.items():
                  key = str(raw_key or "").strip()
                  if not key:
                      raise SystemExit(f"{name} contains an empty key")
                  if not isinstance(raw_value, str):
                      raise SystemExit(f"{name}.{key} must be a string")
                  normalized[key] = raw_value
              return normalized

          plain = load_payload("RUNTIME_PLAIN_ENV_JSON")
          secret = load_payload("RUNTIME_SECRET_ENV_JSON")
          overlap = sorted(set(plain) & set(secret))
          if overlap:
              raise SystemExit(
                  "RUNTIME_PLAIN_ENV_JSON and RUNTIME_SECRET_ENV_JSON must not share keys: "
                  + ", ".join(overlap)
              )
          classification_errors = runtime_json_classification_errors(plain, secret)
          if classification_errors:
              raise SystemExit("\n".join(classification_errors))

          merged = {**plain, **secret}
          output = Path(".runtime") / f"{os.environ['DEPLOY_ENVIRONMENT']}.env"
          lines = []
          for key in sorted(merged):
              value = merged[key]
              rendered = "" if value == "" else shlex.quote(value)
              lines.append(f"{key}={rendered}")
          output.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Generate managed runtime, migration, and deployment bundle
        id: managed_bundle
        shell: bash
        env:
          API_PROMOTION_REF: ${{ inputs.api_promotion_ref }}
          BATCH_PROMOTION_REF: ${{ inputs.batch_promotion_ref }}
        run: |
          set -euo pipefail
          uv run python3 scripts/generate_managed_runtime_env.py \
            --environment "${DEPLOY_ENVIRONMENT}" \
            --template-path .env.example \
            --output-path ".runtime/${DEPLOY_ENVIRONMENT}.env" \
            --report-path ".runtime/${DEPLOY_ENVIRONMENT}.report.json"

          python3 - <<'PY' > ".runtime/${DEPLOY_ENVIRONMENT}.database-url"
          from __future__ import annotations

          import os
          from pathlib import Path
          import shlex

          runtime_env = Path(f".runtime/{os.environ['DEPLOY_ENVIRONMENT']}.env")
          for raw_line in runtime_env.read_text(encoding="utf-8").splitlines():
              if not raw_line.startswith("DATABASE_URL="):
                  continue
              raw_value = raw_line.partition("=")[2].strip()
              if not raw_value:
                  raise SystemExit("DATABASE_URL is missing from the materialized runtime env")
              parsed = shlex.split(raw_value, posix=True)
              print(parsed[0] if parsed else "")
              raise SystemExit(0)
          raise SystemExit("DATABASE_URL is missing from the materialized runtime env")
          PY
          MIGRATION_DATABASE_URL="$(< ".runtime/${DEPLOY_ENVIRONMENT}.database-url")"

          uv run python3 scripts/generate_managed_migration_env.py \
            --environment "${DEPLOY_ENVIRONMENT}" \
            --output-path ".runtime/${DEPLOY_ENVIRONMENT}.migrate.env" \
            --report-path ".runtime/${DEPLOY_ENVIRONMENT}.migrate.report.json" \
            --database-url "${MIGRATION_DATABASE_URL}"

          uv run python3 scripts/validate_runtime_env.py \
            --environment "${DEPLOY_ENVIRONMENT}" \
            --env-file ".runtime/${DEPLOY_ENVIRONMENT}.env"

          uv run python3 scripts/validate_migration_env.py \
            --env-file ".runtime/${DEPLOY_ENVIRONMENT}.migrate.env"

          uv run python3 scripts/generate_managed_deployment_artifacts.py \
            --environment "${DEPLOY_ENVIRONMENT}" \
            --runtime-env-file ".runtime/${DEPLOY_ENVIRONMENT}.env" \
            --output-dir "${DEPLOY_DIR}" \
            --release-tag "${RELEASE_TAG}" \
            --git-sha "${{ github.sha }}" \
            --api-promotion-ref "${API_PROMOTION_REF}" \
            --batch-promotion-ref "${BATCH_PROMOTION_REF}" \
            --gcp-project-id "${{ vars.GCP_PROJECT_ID }}" \
            --gcp-region "${{ vars.GCP_REGION }}" \
            --cloudflare-account-id "${{ vars.CLOUDFLARE_ACCOUNT_ID }}" \
            --cloudflare-zone-id "${{ vars.CLOUDFLARE_ZONE_ID }}" \
            --cloudflare-pages-project-name "${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}" \
            --cloudflare-pages-production-branch "${{ vars.CLOUDFLARE_PAGES_PRODUCTION_BRANCH }}" \
            --supabase-organization-id "${{ vars.SUPABASE_ORGANIZATION_ID }}" \
            --supabase-project-name "${{ vars.SUPABASE_PROJECT_NAME }}" \
            --supabase-region "${{ vars.SUPABASE_REGION }}"

          uv run python3 scripts/verify_managed_deployment_bundle.py \
            --environment "${DEPLOY_ENVIRONMENT}"

          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          deploy_dir = Path(os.environ["DEPLOY_DIR"])
          report = json.loads((deploy_dir / "deployment.report.json").read_text(encoding="utf-8"))
          tfvars = json.loads((deploy_dir / "terraform.runtime.auto.tfvars.json").read_text(encoding="utf-8"))
          pages = json.loads((deploy_dir / "cloudflare-pages-env.json").read_text(encoding="utf-8"))

          if not report.get("ready_for_terraform"):
              raise SystemExit("managed deployment bundle is not ready_for_terraform")
          if not report.get("ready_for_release_promotion"):
              raise SystemExit("managed deployment bundle is not ready_for_release_promotion")

          outputs = {
              "migration_env_path": f".runtime/{os.environ['DEPLOY_ENVIRONMENT']}.migrate.env",
              "tfvars_path": str(deploy_dir / "terraform.runtime.auto.tfvars.json"),
              "api_url": str(tfvars["api_url"]),
              "cloudflare_account_id": str(tfvars["cloudflare_account_id"]),
              "cloudflare_pages_project_name": str(tfvars["cloudflare_pages_project_name"]),
              "cloudflare_pages_production_branch": str(tfvars["cloudflare_pages_production_branch"]),
              "supabase_project_ref": str(tfvars["supabase_project_ref"]),
              "public_api_url": str(pages["PUBLIC_API_URL"]),
              "public_supabase_url": str(pages["PUBLIC_SUPABASE_URL"]),
              "public_supabase_anon_key": str(pages["PUBLIC_SUPABASE_ANON_KEY"]),
          }

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Render managed deployment handoff
        shell: bash
        run: |
          set -euo pipefail
          uv run python3 scripts/render_managed_deployment_handoff.py \
            --environment "${DEPLOY_ENVIRONMENT}"

      - name: Upload non-secret deployment evidence bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: managed-deployment-bundle-${{ inputs.environment }}-${{ inputs.release_tag }}
          path: |
            .runtime/${{ inputs.environment }}.report.json
            .runtime/${{ inputs.environment }}.migrate.report.json
            .runtime/deploy/${{ inputs.environment }}/unified-platform-manifest.json
            .runtime/deploy/${{ inputs.environment }}/cloudflare-pages-env.json
            .runtime/deploy/${{ inputs.environment }}/artifact-registry-release.json
            .runtime/deploy/${{ inputs.environment }}/deployment.report.json
            .runtime/deploy/${{ inputs.environment }}/technology-value-admission-receipt.json
            .runtime/deploy/${{ inputs.environment }}/operator-handoff.md
          retention-days: 30

      - name: Terraform apply unified platform
        if: ${{ inputs.apply_infrastructure }}
        shell: bash
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          TF_VAR_supabase_database_password: ${{ secrets.SUPABASE_DATABASE_PASSWORD }}
        run: |
          set -euo pipefail
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="prefix=unified-platform/${DEPLOY_ENVIRONMENT}"
          if ! terraform -chdir=terraform state show supabase_project.platform >/dev/null 2>&1; then
            terraform -chdir=terraform import \
              -var-file="../${{ steps.managed_bundle.outputs.tfvars_path }}" \
              supabase_project.platform \
              "${{ steps.managed_bundle.outputs.supabase_project_ref }}"
          fi
          terraform -chdir=terraform plan \
            -var-file="../${{ steps.managed_bundle.outputs.tfvars_path }}" \
            -out=tfplan
          terraform -chdir=terraform apply -auto-approve tfplan

      - name: Update Cloud Run app images
        if: ${{ ! inputs.apply_infrastructure }}
        shell: bash
        env:
          API_PROMOTION_REF: ${{ inputs.api_promotion_ref }}
          BATCH_PROMOTION_REF: ${{ inputs.batch_promotion_ref }}
        run: |
          set -euo pipefail
          targets_env="${RUNNER_TEMP}/cloud-run-app-targets.env"
          python3 - <<'PY' > "${targets_env}"
          from __future__ import annotations

          import os
          import shlex
          from pathlib import Path

          runtime_env = Path(f".runtime/{os.environ['DEPLOY_ENVIRONMENT']}.env")
          values: dict[str, str] = {}
          for raw_line in runtime_env.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, _, raw_value = line.partition("=")
              parsed = shlex.split(raw_value, posix=True)
              values[key] = parsed[0] if parsed else ""

          required = {
              "API_SERVICE_NAME": "GCP_CLOUD_RUN_SERVICE_NAME",
              "BATCH_JOB_NAME": "GCP_CLOUD_RUN_BATCH_JOB_NAME",
          }
          for output_name, runtime_key in required.items():
              value = values.get(runtime_key, "").strip()
              if not value:
                  raise SystemExit(f"{runtime_key} is required for app-only deploys")
              print(f"{output_name}={shlex.quote(value)}")
          PY

          set -a
          source "${targets_env}"
          set +a

          gcloud run services update "${API_SERVICE_NAME}" \
            --image="${API_PROMOTION_REF}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

          gcloud run jobs update "${BATCH_JOB_NAME}" \
            --image="${BATCH_PROMOTION_REF}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source "${{ steps.managed_bundle.outputs.migration_env_path }}"
          set +a
          uv run alembic upgrade head

      - name: Setup Dashboard Toolchain
        uses: ./.github/actions/setup-dashboard
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Cache Playwright Browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Build dashboard
        shell: bash
        env:
          PUBLIC_API_URL: ${{ steps.managed_bundle.outputs.public_api_url }}
          PUBLIC_SUPABASE_URL: ${{ steps.managed_bundle.outputs.public_supabase_url }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ steps.managed_bundle.outputs.public_supabase_anon_key }}
        run: |
          set -euo pipefail
          pnpm --dir dashboard run build

      - name: Deploy dashboard to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.managed_bundle.outputs.cloudflare_account_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          deploy_dir = Path(os.environ["DEPLOY_DIR"])
          pages = json.loads((deploy_dir / "cloudflare-pages-env.json").read_text(encoding="utf-8"))
          tfvars = json.loads((deploy_dir / "terraform.runtime.auto.tfvars.json").read_text(encoding="utf-8"))

          def toml_string(value: object) -> str:
              return json.dumps(str(value))

          api_origin = str(tfvars["api_url"]).rstrip("/")
          wrangler_config = "\n".join(
              [
                  f"name = {toml_string(tfvars['cloudflare_pages_project_name'])}",
                  'pages_build_output_dir = ".svelte-kit/cloudflare"',
                  'compatibility_date = "2026-03-01"',
                  'compatibility_flags = ["nodejs_compat"]',
                  "",
                  "[vars]",
                  f"PRIVATE_API_ORIGIN = {toml_string(api_origin)}",
                  f"PUBLIC_API_URL = {toml_string(pages['PUBLIC_API_URL'])}",
                  f"PUBLIC_SUPABASE_URL = {toml_string(pages['PUBLIC_SUPABASE_URL'])}",
                  f"PUBLIC_SUPABASE_ANON_KEY = {toml_string(pages['PUBLIC_SUPABASE_ANON_KEY'])}",
                  "",
              ]
          )
          Path("dashboard/wrangler.toml").write_text(wrangler_config, encoding="utf-8")
          PY
          pnpm --dir dashboard exec wrangler pages deploy .svelte-kit/cloudflare --project-name "${{ steps.managed_bundle.outputs.cloudflare_pages_project_name }}" --branch "${{ steps.managed_bundle.outputs.cloudflare_pages_production_branch }}"

      - name: Smoke check API liveness
        shell: bash
        run: |
          set -euo pipefail
          api_health_url="${{ steps.managed_bundle.outputs.api_url }}/health/live"
          response_headers="${RUNNER_TEMP}/api-health-live.headers"
          response_body="${RUNNER_TEMP}/api-health-live.json"

          for attempt in $(seq 1 18); do
            http_status="$(
              curl --silent --show-error --location --max-time 10 \
                --dump-header "${response_headers}" \
                --output "${response_body}" \
                --write-out "%{http_code}" \
                "${api_health_url}" || true
            )"
            if [[ "${http_status}" == "200" ]]; then
              cat "${response_body}"
              exit 0
            fi

            echo "API liveness not ready yet (attempt ${attempt}/18, status=${http_status:-curl_error})."
            if [[ "${attempt}" -lt 18 ]]; then
              sleep 10
            fi
          done

          echo "API liveness failed after the bounded retry window."
          echo "--- response headers ---"
          cat "${response_headers}" || true
          echo "--- response body ---"
          cat "${response_body}" || true
          exit 1

      - name: Refresh codebase audit report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .runtime
          uv run python3 scripts/refresh_codebase_audit_report.py \
            --report ".runtime/${DEPLOY_ENVIRONMENT}.audit.report.json"

      - name: Verify managed release readiness
        shell: bash
        run: |
          set -euo pipefail
          uv run python3 scripts/verify_managed_release_readiness.py \
            --environment "${DEPLOY_ENVIRONMENT}" \
            --audit-report ".runtime/${DEPLOY_ENVIRONMENT}.audit.report.json" \
            --runtime-report ".runtime/${DEPLOY_ENVIRONMENT}.report.json" \
            --migration-report ".runtime/${DEPLOY_ENVIRONMENT}.migrate.report.json" \
            --deployment-report "${DEPLOY_DIR}/deployment.report.json" \
            --skip-webserver
