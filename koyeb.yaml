# Valdrics Koyeb Configuration
# Reference managed-platform manifest only. The checked-in definition is branch-driven
# and is not, by itself, a supported immutable-production release profile.
# https://www.koyeb.com/docs/deploy/koyeb-files

name: valdrics-api
type: WEB
definition:
  git:
    repository: github.com/Valdrics/valdrics
    branch: main
    builder: docker
    dockerfile: Dockerfile

  scaling:
    min: 2
    max: 3
    targets:
      cpu:
        value: 70

  instance_type: micro

  ports:
    - port: 8000
      protocol: http

  routes:
    - path: /
      port: 8000

  health_checks:
    - type: http
      path: /health/live
      port: 8000
      interval_seconds: 30
      timeout_seconds: 10
      healthy_threshold: 2
      unhealthy_threshold: 3

  env:
    - name: ENVIRONMENT
      value: production
    - name: ENABLE_SCHEDULER
      value: "true"
    - name: WEB_CONCURRENCY
      value: "2"
    - name: API_URL
      value: https://api.valdrics.ai
    - name: FRONTEND_URL
      value: https://dashboard.valdrics.ai
    - name: LOG_LEVEL
      value: INFO
    - name: LLM_PROVIDER
      value: groq
    - name: EXPOSE_API_DOCUMENTATION_PUBLICLY
      value: "false"
    - name: OTEL_LOGS_EXPORT_ENABLED
      value: "true"
    - name: SAAS_STRICT_INTEGRATIONS
      value: "true"
    - name: TRUST_PROXY_HEADERS
      value: "true"
    - name: CORS_ORIGINS
      value: "[\"https://dashboard.valdrics.ai\"]"
    - name: APP_RUNTIME_DATA_DIR
      value: /tmp/valdrics
    # Prophet fallback is break-glass only. Provision these secrets only for an
    # audited short-lived exception; otherwise the runtime should fail closed.
    - name: FORECASTER_ALLOW_HOLT_WINTERS_FALLBACK
      secret: valdrics-forecaster-break-glass-enabled
    - name: FORECASTER_BREAK_GLASS_REASON
      secret: valdrics-forecaster-break-glass-reason
    - name: FORECASTER_BREAK_GLASS_EXPIRES_AT
      secret: valdrics-forecaster-break-glass-expires-at
    # Secrets - set via Koyeb dashboard
    - name: DATABASE_URL
      secret: valdrics-database-url
    - name: REDIS_URL
      secret: valdrics-redis-url
    - name: SUPABASE_JWT_SECRET
      secret: valdrics-jwt-secret
    - name: ENFORCEMENT_APPROVAL_TOKEN_SECRET
      secret: valdrics-enforcement-approval-token-secret
    - name: ENFORCEMENT_EXPORT_SIGNING_SECRET
      secret: valdrics-enforcement-export-signing-secret
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      secret: valdrics-otlp-endpoint
    - name: ENCRYPTION_KEY
      secret: valdrics-encryption-key
    - name: KDF_SALT
      secret: valdrics-kdf-salt
    - name: CSRF_SECRET_KEY
      secret: valdrics-csrf-secret
    - name: ADMIN_API_KEY
      secret: valdrics-admin-api-key
    - name: INTERNAL_JOB_SECRET
      secret: valdrics-internal-job-secret
    - name: GROQ_API_KEY
      secret: valdrics-groq-key
    - name: PAYSTACK_SECRET_KEY
      secret: valdrics-paystack-secret
    - name: PAYSTACK_PUBLIC_KEY
      secret: valdrics-paystack-public
    - name: SENTRY_DSN
      secret: valdrics-sentry-dsn
    - name: TRUSTED_PROXY_CIDRS
      secret: valdrics-trusted-proxy-cidrs
    - name: INTERNAL_METRICS_AUTH_TOKEN
      secret: valdrics-internal-metrics-token
