services:
  postgres:
    image: postgres:16.8-alpine
    container_name: valdrics-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-valdrics}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-valdrics-local-dev-only-change-before-sharing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-valdrics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2.5-alpine
    container_name: valdrics-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # The main application
  api:
    container_name: valdrics-api
    image: valdrics-api
    build: . 
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # The prometheus server: Scrapes the internal-only metrics endpoint from API
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9095:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  # The grafana server: Visualizes metrics from Prometheus
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in your environment or .env}
    depends_on:
      - prometheus

  dashboard:
    container_name: valdrics-dashboard
    image: valdrics-dashboard
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000

volumes:
  postgres_data:
  redis_data:
