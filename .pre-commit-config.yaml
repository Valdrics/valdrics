# Pre-commit configuration for Valdrics
# Install: uv sync --group dev && uv run pre-commit install --install-hooks

default_install_hook_types: [pre-commit, pre-push, commit-msg]
minimum_pre_commit_version: "3.2.0"

repos:
  - repo: local
    hooks:
      - id: check-local-env-live-secrets
        name: check-local-env-live-secrets
        entry: python3 scripts/security/check_local_env_for_live_secrets.py
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push, manual]

      - id: verify-repo-root-hygiene
        name: verify-repo-root-hygiene
        entry: uv run python3 scripts/verify_repo_root_hygiene.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push, manual]

      - id: verify-env-hygiene
        name: verify-env-hygiene
        entry: uv run python3 scripts/verify_env_hygiene.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push, manual]

      - id: verify-dependency-locking
        name: verify-dependency-locking
        entry: uv run python3 scripts/verify_dependency_locking.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

      - id: verify-documentation-runtime-contracts
        name: verify-documentation-runtime-contracts
        entry: uv run python3 scripts/verify_documentation_runtime_contracts.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

      - id: verify-docs-archive-hygiene
        name: verify-docs-archive-hygiene
        entry: uv run python3 scripts/verify_docs_archive_hygiene.py
        language: system
        pass_filenames: false
        files: ^(docs/|scripts/verify_docs_archive_hygiene\.py)
        stages: [pre-push, manual]

      - id: verify-reports-archive-hygiene
        name: verify-reports-archive-hygiene
        entry: uv run python3 scripts/verify_reports_archive_hygiene.py
        language: system
        pass_filenames: false
        files: ^(reports/|scripts/verify_reports_archive_hygiene\.py)
        stages: [pre-push, manual]

      - id: verify-enterprise-placeholder-guards
        name: verify-enterprise-placeholder-guards
        entry: uv run python3 scripts/verify_enterprise_placeholder_guards.py --profile strict
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

      - id: verify-container-image-pinning
        name: verify-container-image-pinning
        entry: uv run python3 scripts/verify_container_image_pinning.py
        language: system
        pass_filenames: false
        files: ^(docker-compose\.yml|docker-compose\.observability\.yml|scripts/verify_container_image_pinning\.py)$
        stages: [pre-push, manual]

      - id: verify-alembic-head-integrity
        name: verify-alembic-head-integrity
        entry: uv run python3 scripts/verify_alembic_head_integrity.py
        language: system
        pass_filenames: false
        files: ^(migrations/versions/|scripts/verify_alembic_head_integrity\.py)$
        stages: [pre-push, manual]

      - id: verify-architecture-decision-records
        name: verify-architecture-decision-records
        entry: uv run python3 scripts/verify_architecture_decision_records.py
        language: system
        pass_filenames: false
        files: ^(docs/architecture/|scripts/verify_architecture_decision_records\.py)$
        stages: [pre-push, manual]

      - id: verify-jwt-bcp-checklist
        name: verify-jwt-bcp-checklist
        entry: uv run python3 scripts/verify_jwt_bcp_checklist.py
        language: system
        pass_filenames: false
        files: ^(docs/security/jwt_bcp_checklist\.json|scripts/verify_jwt_bcp_checklist\.py)$
        stages: [pre-push, manual]

      - id: verify-ssdf-traceability-matrix
        name: verify-ssdf-traceability-matrix
        entry: uv run python3 scripts/verify_ssdf_traceability_matrix.py
        language: system
        pass_filenames: false
        files: ^(docs/security/ssdf_traceability_matrix\.json|scripts/verify_ssdf_traceability_matrix\.py)$
        stages: [pre-push, manual]

      - id: verify-dashboard-runtime-contract
        name: verify-dashboard-runtime-contract
        entry: uv run python3 scripts/verify_dashboard_runtime_contract.py --build --skip-smoke
        language: system
        pass_filenames: false
        files: ^(dashboard/|Dockerfile\.dashboard|scripts/verify_dashboard_runtime_contract\.py)$
        stages: [manual]

  # Ruff - Fast Python linter & formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # MyPy - Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary]
        additional_dependencies:
          - pydantic>=2.0
          - fastapi>=0.100
          - sqlalchemy>=2.0
        exclude: ^(tests/|migrations/)

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD041]

  # Security - detect secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Python security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        args: [-ll, -ii, -s, B101]
        exclude: ^tests/

  # Commit message format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from hooks
  autofix_prs: true
  autoupdate_branch: develop
  autoupdate_commit_msg: "[pre-commit.ci] autoupdate"
  autoupdate_schedule: weekly
