{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "valdrics.fullname" . }}-runtime
  namespace: {{ default .Release.Namespace .Values.externalSecrets.namespace }}
  labels:
    {{- include "valdrics.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
  target:
    name: {{ .Values.externalSecrets.target.name | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
    deletionPolicy: {{ .Values.externalSecrets.target.deletionPolicy | quote }}
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.remoteSecretKey | quote }}
{{- end }}
